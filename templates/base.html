<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Asterism — Test XPUB App{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="/">Asterism · test-app-xpub</a>
    </div>
    <nav class="nav">
      {% block nav %}{% endblock %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>Dev build. Not for production. BIP-48 multisig over consumer hardware wallets.</small>
  </footer>
</body>
</html>
